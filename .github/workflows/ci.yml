name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx fastapi uvicorn xgboost scikit-learn numpy pandas joblib evidently

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/ --select=E,W,F --ignore=E501 || true

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t realtime-fraud-detection:${{ github.sha }} .

      - name: Test container startup
        run: |
          docker run -d --name fraud-api -p 8000:8000 realtime-fraud-detection:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs fraud-api && exit 1)
          docker stop fraud-api
